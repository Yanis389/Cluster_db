# 1. Nettoyage
docker rm -f haproxy

# 2. Lancement avec config injectée par stdin
docker run -d \
  --name haproxy \
  --network cluster_db_default \
  -p 5432:5432 \
  haproxy:latest \
  haproxy -f /dev/stdin <<EOF
defaults
    mode tcp
    timeout connect 5s
    timeout client 50s
    timeout server 50s

frontend postgres_front
    bind *:5432
    default_backend postgres_back

backend postgres_back
    mode tcp
    option tcp-check
    server pg-master pg-master:5432 check
    server pg-replica pg-replica:5432 check backup
EOF